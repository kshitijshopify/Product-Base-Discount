# Tags we check: discount:1 through discount:100 (order discount %)
query CartInput {
  cart {
    lines {
      id
      cost {
        subtotalAmount {
          amount
        }
      }
      merchandise {
        ... on ProductVariant {
          product {
            id
            hasTags(
              tags: [
                "discount:1", "discount:2", "discount:3", "discount:4", "discount:5",
                "discount:6", "discount:7", "discount:8", "discount:9", "discount:10",
                "discount:11", "discount:12", "discount:13", "discount:14", "discount:15",
                "discount:16", "discount:17", "discount:18", "discount:19", "discount:20",
                "discount:21", "discount:22", "discount:23", "discount:24", "discount:25",
                "discount:26", "discount:27", "discount:28", "discount:29", "discount:30",
                "discount:31", "discount:32", "discount:33", "discount:34", "discount:35",
                "discount:36", "discount:37", "discount:38", "discount:39", "discount:40",
                "discount:41", "discount:42", "discount:43", "discount:44", "discount:45",
                "discount:46", "discount:47", "discount:48", "discount:49", "discount:50",
                "discount:51", "discount:52", "discount:53", "discount:54", "discount:55",
                "discount:56", "discount:57", "discount:58", "discount:59", "discount:60",
                "discount:61", "discount:62", "discount:63", "discount:64", "discount:65",
                "discount:66", "discount:67", "discount:68", "discount:69", "discount:70",
                "discount:71", "discount:72", "discount:73", "discount:74", "discount:75",
                "discount:76", "discount:77", "discount:78", "discount:79", "discount:80",
                "discount:81", "discount:82", "discount:83", "discount:84", "discount:85",
                "discount:86", "discount:87", "discount:88", "discount:89", "discount:90",
                "discount:91", "discount:92", "discount:93", "discount:94", "discount:95",
                "discount:96", "discount:97", "discount:98", "discount:99", "discount:100"
              ]
            ) {
              tag
              hasTag
            }
          }
        }
      }
    }
  }
  discount {
    discountClasses
  }
}